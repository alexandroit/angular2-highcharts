<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>@revivejs/angular2-highcharts — Docs</title>
  <meta http-equiv="refresh" content="0; url=angular-15/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fff8ef 0%, #f5fbff 60%, #eef4fb 100%);
      color: #102033;
    }
    .card {
      text-align: center;
      padding: 40px 48px;
      border-radius: 22px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 16px 48px rgba(27,66,110,0.12);
      border: 1px solid rgba(16,32,51,0.09);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p  { margin: 0 0 24px; color: #364b63; }
    .versions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.ver {
      padding: 10px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    a.ver.latest {
      background: linear-gradient(135deg, #d24b2a 0%, #1f5ba7 100%);
      color: #fff;
    }
    a.ver.other {
      background: #edf4fa;
      color: #14324f;
      border: 1px solid rgba(20,50,79,0.15);
    }
    .note { margin-top: 20px; font-size: 12px; color: #7a9bb5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>@revivejs/angular2-highcharts</h1>
    <p>Select an Angular version to view the documentation:</p>
    <div class="versions">
      <a class="ver latest" href="angular-15/">Angular 15 <span style="opacity:.7;font-size:11px">(latest)</span></a>
      <a class="ver other" href="angular-14/">Angular 14</a>
      <a class="ver other" href="angular-13/">Angular 13</a>
      <a class="ver other" href="angular-12/">Angular 12</a>
      <a class="ver other" href="angular-11/">Angular 11</a>
      <a class="ver other" href="angular-10/">Angular 10</a>
      <a class="ver other" href="angular-9/">Angular 9</a>
      <a class="ver other" href="angular-8/">Angular 8</a>
      <a class="ver other" href="angular-7/">Angular 7</a>
      <a class="ver other" href="angular-6/">Angular 6</a>
      <a class="ver other" href="angular-5/">Angular 5</a>
      <a class="ver other" href="angular-4/">Angular 4</a>
    </div>
    <p class="note">Redirecting to the latest version…</p>
  </div>
</body>
</html>
